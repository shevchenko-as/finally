services:
  - type: web
    name: finally
    runtime: docker
    plan: free
    port: 8000
    healthCheckPath: /api/health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false          # you enter this manually in the Render dashboard
      - key: MASSIVE_API_KEY
        value: ""            # leave empty to use the simulator
      - key: LLM_MOCK
        value: "false"
      - key: DB_PATH
        value: /app/db/finally.db
    disk:
      name: finally-data
      mountPath: /app/db
      sizeGB: 1
