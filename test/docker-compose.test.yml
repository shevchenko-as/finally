services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - LLM_MOCK=true
      - DB_PATH=/app/db/finally.db
      - OPENROUTER_API_KEY=mock-key-not-used
    ports:
      - "8000:8000"
    volumes:
      - test-db:/app/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  playwright:
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    working_dir: /tests
    volumes:
      - ./:/tests
    environment:
      - BASE_URL=http://app:8000
    depends_on:
      app:
        condition: service_healthy
    command: npx playwright test

volumes:
  test-db:
